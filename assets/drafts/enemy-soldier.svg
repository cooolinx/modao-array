<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <defs>
    <!-- 玄青宗道袍渐变色 -->
    <linearGradient id="soldierRobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7d8a"/>
      <stop offset="100%" stop-color="#3a4d55"/>
    </linearGradient>
    <!-- 皮肤色 -->
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d5b8"/>
      <stop offset="100%" stop-color="#e0c0a0"/>
    </linearGradient>
  </defs>
  
  <!-- 外圈光晕（玄青宗标识） -->
  <circle cx="18" cy="18" r="16" fill="none" stroke="#84c7ff" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- 身体/道袍 -->
  <path d="M10 30 L26 30 L24 16 L12 16 Z" fill="url(#soldierRobe)" stroke="#7a9aa5" stroke-width="1.5"/>
  
  <!-- 头部 -->
  <circle cx="18" cy="12" r="6" fill="url(#skin)" stroke="#d0b090" stroke-width="1.5"/>
  
  <!-- 发髻（道冠） -->
  <ellipse cx="18" cy="7" rx="5" ry="3" fill="#3a4d55" stroke="#5a7d8a" stroke-width="1"/>
  <circle cx="18" cy="6" r="2" fill="#84c7ff" opacity="0.8"/>
  
  <!-- 手中的剑（斜持） -->
  <line x1="8" y1="20" x2="4" y2="8" stroke="#c0d0e0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="8" x2="2" y2="4" stroke="#a0b0c0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 剑格 -->
  <line x1="6" y1="10" x2="2" y2="8" stroke="#84c7ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <circle cx="16" cy="11" r="1.2" fill="#2a3a45"/>
  <circle cx="20" cy="11" r="1.2" fill="#2a3a45"/>
</svg>
