<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开发者工具 - 魔道塔防</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    color: #e0d8ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  .header {
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header h1 {
    font-size: 18px;
    color: #a78bfa;
    letter-spacing: 0.05em;
  }

  .badge {
    background: #7c3aed;
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.1em;
  }

  .back-btn {
    margin-left: auto;
    color: #6b7280;
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: #a78bfa; }

  .nav {
    background: #141428;
    border-bottom: 1px solid #1e1e3a;
    padding: 0 24px;
    display: flex;
    gap: 0;
  }

  .nav-tab {
    padding: 12px 20px;
    font-size: 13px;
    color: #6b7280;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .nav-tab:hover { color: #a78bfa; }
  .nav-tab.active { color: #a78bfa; border-bottom-color: #7c3aed; }

  .panel { display: none; padding: 24px; }
  .panel.active { display: block; }

  /* ── 角色面板 ── */
  .characters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .char-card {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .char-card:hover {
    border-color: #7c3aed;
    transform: translateY(-2px);
  }

  .char-card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #1e1e3a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .char-name { font-size: 15px; font-weight: 600; }
  .char-type { font-size: 11px; color: #6b7280; letter-spacing: 0.05em; }

  .char-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 500;
  }
  .tag-soldier { background: #1e3a5f; color: #60a5fa; }
  .tag-fast    { background: #1a3a2a; color: #34d399; }
  .tag-tank    { background: #3a2a10; color: #fbbf24; }

  .char-preview {
    background: #0d0d1a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 160px;
    position: relative;
  }

  /* canvas 用于渲染动画 */
  .char-preview canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .char-controls {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    border-top: 1px solid #1e1e3a;
  }

  .speed-label { font-size: 12px; color: #6b7280; }

  .speed-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: #2a2a4a;
    border-radius: 2px;
    outline: none;
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #7c3aed;
    cursor: pointer;
  }

  .speed-val { font-size: 12px; color: #a78bfa; min-width: 28px; text-align: right; }

  .char-info {
    padding: 10px 16px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .info-item { font-size: 12px; color: #4b5563; }
  .info-item span { color: #9ca3af; }

  .scale-btns {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .scale-btn {
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    color: #9ca3af;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .scale-btn:hover, .scale-btn.active { background: #2d2a5e; color: #a78bfa; border-color: #7c3aed; }

  /* 加载状态 */
  .loading-text {
    font-size: 13px;
    color: #4b5563;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .error-text { font-size: 12px; color: #ef4444; }

  /* ── 占位面板 ── */
  .placeholder {
    color: #4b5563;
    font-size: 14px;
    text-align: center;
    padding: 60px 0;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🛠 魔道塔防 · 开发者工具</h1>
  <span class="badge">DEV</span>
  <a class="back-btn" href="index.html">← 返回游戏</a>
</div>

<div class="nav">
  <div class="nav-tab active" data-panel="characters">🧙 角色预览</div>
  <div class="nav-tab" data-panel="map-editor">🗺 地图编辑器</div>
  <div class="nav-tab" data-panel="assets">🖼 资源列表</div>
  <div class="nav-tab" data-panel="config">⚙️ 配置查看</div>
</div>

<!-- 角色面板 -->
<div class="panel active" id="panel-characters">
  <div class="characters-grid" id="chars-grid"></div>
</div>

<!-- 地图编辑器 -->
<div class="panel" id="panel-map-editor">
  <div class="placeholder">
    <p style="margin-bottom: 20px;">地图编辑器已移至独立页面</p>
    <a href="map-editor.html" class="start-button" style="display: inline-block; padding: 12px 24px; background: #7c3aed; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">
      打开地图编辑器 →
    </a>
  </div>
</div>

<!-- 资源列表占位 -->
<div class="panel" id="panel-assets">
  <div class="placeholder">资源列表（开发中）</div>
</div>

<!-- 配置查看占位 -->
<div class="panel" id="panel-config">
  <div class="placeholder">配置查看（开发中）</div>
</div>

<script type="module">
import { assetUrls, enemyTypes } from './src/config.js';

// ── 角色定义 ─────────────────────────────────────────────────────────────────
const CHARS = [
  {
    key: 'soldier',
    name: '剑修弟子',
    tag: '普通',
    tagClass: 'tag-soldier',
    sheetUrl: assetUrls.enemySoldierWalk,
    animSpeed: enemyTypes.soldier.animationSpeed,
    size: enemyTypes.soldier.size,
  },
  {
    key: 'fast',
    name: '御风剑修',
    tag: '速攻',
    tagClass: 'tag-fast',
    sheetUrl: assetUrls.enemyFastWalk,
    animSpeed: enemyTypes.fast.animationSpeed,
    size: enemyTypes.fast.size,
  },
  {
    key: 'tank',
    name: '龙气禁卫',
    tag: '重甲',
    tagClass: 'tag-tank',
    sheetUrl: assetUrls.enemyTankWalk,
    animSpeed: enemyTypes.tank.animationSpeed,
    size: enemyTypes.tank.size,
  },
];

// ── 构建卡片 ─────────────────────────────────────────────────────────────────
const grid = document.getElementById('chars-grid');

CHARS.forEach(char => {
  const card = document.createElement('div');
  card.className = 'char-card';
  card.innerHTML = `
    <div class="char-card-header">
      <div>
        <div class="char-name">${char.name}</div>
        <div class="char-type">${char.key}</div>
      </div>
      <span class="char-tag ${char.tagClass}">${char.tag}</span>
    </div>
    <div class="char-preview" id="preview-${char.key}">
      <span class="loading-text">加载中...</span>
    </div>
    <div class="char-controls">
      <span class="speed-label">速度</span>
      <input class="speed-slider" type="range" min="1" max="30" value="${Math.round(char.animSpeed * 100)}" id="speed-${char.key}">
      <span class="speed-val" id="speedval-${char.key}">${char.animSpeed.toFixed(2)}</span>
      <div class="scale-btns">
        <button class="scale-btn active" data-key="${char.key}" data-scale="1">1×</button>
        <button class="scale-btn" data-key="${char.key}" data-scale="2">2×</button>
        <button class="scale-btn" data-key="${char.key}" data-scale="4">4×</button>
      </div>
    </div>
    <div class="char-info">
      <div class="info-item">尺寸 <span>${char.size}px</span></div>
      <div class="info-item">帧数 <span>4</span></div>
      <div class="info-item">动画速度 <span>${char.animSpeed}</span></div>
      <div class="info-item">Sheet <span>2048×512</span></div>
    </div>
  `;
  grid.appendChild(card);
  initCharAnim(char);
});

// ── 动画渲染 ─────────────────────────────────────────────────────────────────
function initCharAnim(char) {
  const preview = document.getElementById(`preview-${char.key}`);
  const img = new Image();

  img.onload = () => {
    preview.innerHTML = '';
    const frameW = img.width / 4;
    const frameH = img.height;

    const canvas = document.createElement('canvas');
    let scale = 1;
    canvas.width = frameW * scale;
    canvas.height = frameH * scale;
    canvas.style.width = frameW * scale + 'px';
    canvas.style.height = frameH * scale + 'px';
    preview.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let frame = 0;
    let speed = char.animSpeed; // frames per tick (60fps base)
    let accumulator = 0;
    let lastTime = performance.now();

    function draw() {
      const now = performance.now();
      const delta = (now - lastTime) / 1000;
      lastTime = now;

      accumulator += delta * 60 * speed;
      while (accumulator >= 1) {
        frame = (frame + 1) % 4;
        accumulator -= 1;
      }

      canvas.width = frameW * scale;
      canvas.height = frameH * scale;
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, frame * frameW, 0, frameW, frameH, 0, 0, frameW * scale, frameH * scale);

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // 速度滑块
    const slider = document.getElementById(`speed-${char.key}`);
    const valEl = document.getElementById(`speedval-${char.key}`);
    slider.addEventListener('input', () => {
      speed = slider.value / 100;
      valEl.textContent = speed.toFixed(2);
    });

    // 缩放按钮
    document.querySelectorAll(`.scale-btn[data-key="${char.key}"]`).forEach(btn => {
      btn.addEventListener('click', () => {
        scale = parseInt(btn.dataset.scale);
        canvas.style.width = frameW * scale + 'px';
        canvas.style.height = frameH * scale + 'px';
        document.querySelectorAll(`.scale-btn[data-key="${char.key}"]`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  };

  img.onerror = () => {
    preview.innerHTML = `<span class="error-text">❌ 加载失败<br>${char.sheetUrl}</span>`;
  };

  img.src = char.sheetUrl;
}

// ── Tab 切换 ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`panel-${tab.dataset.panel}`).classList.add('active');
  });
});
</script>
</body>
</html>
