<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地图编辑器 - 魔道塔防</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    color: #e0d8ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  .header {
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
  }

  .header h1 {
    font-size: 18px;
    color: #a78bfa;
    letter-spacing: 0.05em;
  }

  .badge {
    background: #7c3aed;
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.1em;
  }

  .back-btn {
    color: #6b7280;
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: #a78bfa; }

  .toolbar {
    background: #141428;
    border-bottom: 1px solid #1e1e3a;
    padding: 10px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .tool-group {
    display: flex;
    gap: 6px;
    align-items: center;
    padding-right: 12px;
    border-right: 1px solid #2a2a4a;
  }
  .tool-group:last-child { border-right: none; }

  .tool-label {
    font-size: 12px;
    color: #6b7280;
    margin-right: 4px;
  }

  .tool-btn {
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    color: #9ca3af;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tool-btn:hover { background: #2d2a5e; color: #a78bfa; border-color: #7c3aed; }
  .tool-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; }

  .tool-input {
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    color: #e0d8ff;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    width: 60px;
  }

  .tool-select {
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    color: #e0d8ff;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    min-width: 150px;
    cursor: pointer;
  }

  .canvas-container {
    display: flex;
    height: calc(100vh - 120px);
  }

  .canvas-area {
    flex: 1;
    overflow: auto;
    background: #0a0a14;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #map-canvas {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    cursor: crosshair;
  }

  .sidebar {
    width: 320px;
    background: #141428;
    border-left: 1px solid #1e1e3a;
    padding: 16px;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 20px;
  }

  .sidebar-title {
    font-size: 13px;
    color: #a78bfa;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #2a2a4a;
  }

  .path-node-list {
    max-height: 300px;
    overflow-y: auto;
  }

  .path-node-item {
    background: #1e1e3a;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .path-node-item .node-coords {
    color: #9ca3af;
  }

  .path-node-item .node-actions {
    display: flex;
    gap: 4px;
  }

  .node-action-btn {
    background: transparent;
    border: none;
    color: #6b7280;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .node-action-btn:hover { background: #2a2a4a; color: #ef4444; }

  .export-area {
    background: #0d0d1a;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 10px;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    color: #34d399;
    max-height: 400px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .help-text {
    font-size: 11px;
    color: #6b7280;
    line-height: 1.6;
  }

  .help-text kbd {
    background: #2a2a4a;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Consolas', monospace;
  }

  .bg-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #9ca3af;
    cursor: pointer;
  }

  .bg-toggle input[type="checkbox"] {
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🗺 地图编辑器</h1>
  <span class="badge">DEV</span>
  <a class="back-btn" href="dev.html">← 开发者工具</a>
</div>

<div class="toolbar">
  <div class="tool-group">
    <span class="tool-label">关卡:</span>
    <select class="tool-select" id="level-select"></select>
  </div>

  <div class="tool-group">
    <span class="tool-label">网格:</span>
    <input type="number" class="tool-input" id="grid-width" value="32" min="8" max="64">
    <span class="tool-label">×</span>
    <input type="number" class="tool-input" id="grid-height" value="18" min="8" max="64">
    <button class="tool-btn" id="apply-grid">应用</button>
  </div>

  <div class="tool-group">
    <span class="tool-label">背景:</span>
    <select class="tool-select" id="bg-select">
      <option value="">无背景</option>
      <option value="assets/bg-chapter-1.png">第 1 章背景</option>
    </select>
    <label class="bg-toggle">
      <input type="checkbox" id="bg-opacity" checked>
      半透明
    </label>
  </div>

  <div class="tool-group">
    <span class="tool-label">工具:</span>
    <button class="tool-btn active" data-tool="path">🛤 路径</button>
    <button class="tool-btn" data-tool="tower">🏰 塔位</button>
    <button class="tool-btn" data-tool="erase">🧹 擦除</button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="undo-btn">↩ 撤销</button>
    <button class="tool-btn" id="clear-btn">🗑 清空</button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="load-btn">📂 加载</button>
    <button class="tool-btn" id="export-btn">📋 导出</button>
    <button class="tool-btn" id="save-btn">💾 保存</button>
  </div>
</div>

<div class="canvas-container">
  <div class="canvas-area">
    <canvas id="map-canvas"></canvas>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">📍 路径节点</div>
      <div class="path-node-list" id="path-node-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">🏰 塔位</div>
      <div class="help-text" id="tower-count">共 0 个塔位</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">💡 使用说明</div>
      <div class="help-text">
        <p><kbd>左键</kbd> 添加路径节点/塔位</p>
        <p><kbd>右键</kbd> 删除节点/塔位</p>
        <p><kbd>Ctrl+Z</kbd> 撤销</p>
        <p>路径会自动连接相邻节点</p>
        <p style="margin-top: 8px;">选择关卡后点击"加载"可导入现有配置</p>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">📋 导出配置</div>
      <div class="export-area" id="export-output">点击"导出"按钮生成...</div>
    </div>
  </div>
</div>

<script type="module">
import { defaultTileSize, getGridConfig } from './src/config.js';
import { campaigns } from './src/levels/campaigns.js';

// ── 状态 ─────────────────────────────────────────────────────────────────────
let gridWidth = 32;
let gridHeight = 18;
let tileSize = defaultTileSize;

let pathNodes = [];
let towerSpots = [];
let currentTool = 'path';
let history = [];
let backgroundImage = null;
let bgOpacity = 0.5;

// ── Canvas 设置 ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = gridWidth * tileSize;
  canvas.height = gridHeight * tileSize;
  render();
}

// ── 渲染 ─────────────────────────────────────────────────────────────────────
function render() {
  // 清空
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 背景图（如果有）
  if (backgroundImage) {
    ctx.globalAlpha = bgOpacity;
    ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1.0;
  }

  // 网格线
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1;
  for (let x = 0; x <= gridWidth; x++) {
    ctx.beginPath();
    ctx.moveTo(x * tileSize, 0);
    ctx.lineTo(x * tileSize, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= gridHeight; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * tileSize);
    ctx.lineTo(canvas.width, y * tileSize);
    ctx.stroke();
  }

  // 路径
  if (pathNodes.length > 0) {
    // 路径连线
    ctx.strokeStyle = '#4a2d2d';
    ctx.lineWidth = tileSize * 0.6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pathNodes[0].x * tileSize + tileSize/2, pathNodes[0].y * tileSize + tileSize/2);
    for (let i = 1; i < pathNodes.length; i++) {
      ctx.lineTo(pathNodes[i].x * tileSize + tileSize/2, pathNodes[i].y * tileSize + tileSize/2);
    }
    ctx.stroke();

    // 路径格子
    pathNodes.forEach((node, i) => {
      const x = node.x * tileSize;
      const y = node.y * tileSize;
      const ratio = i / Math.max(pathNodes.length - 1, 1);
      let color;
      if (ratio < 0.3) color = '#2d4a3e';
      else if (ratio < 0.7) color = '#2a303b';
      else color = '#4a2d2d';
      ctx.fillStyle = color;
      ctx.fillRect(x, y, tileSize, tileSize);
    });

    // 节点标记
    pathNodes.forEach((node, i) => {
      const cx = node.x * tileSize + tileSize/2;
      const cy = node.y * tileSize + tileSize/2;
      
      ctx.fillStyle = i === 0 ? '#3ecf8e' : (i === pathNodes.length - 1 ? '#ff6b6b' : '#a78bfa');
      ctx.beginPath();
      ctx.arc(cx, cy, tileSize * 0.3, 0, Math.PI * 2);
      ctx.fill();

      // 序号
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.floor(tileSize * 0.4)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i.toString(), cx, cy);
    });
  }

  // 塔位
  towerSpots.forEach(spot => {
    const cx = spot.x * tileSize + tileSize/2;
    const cy = spot.y * tileSize + tileSize/2;
    
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, tileSize * 0.4, 0, Math.PI * 2);
    ctx.stroke();
    
    ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
    ctx.beginPath();
    ctx.arc(cx, cy, tileSize * 0.4, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ── 交互 ─────────────────────────────────────────────────────────────────────
function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const cellX = Math.floor(x / tileSize);
  const cellY = Math.floor(y / tileSize);
  if (cellX < 0 || cellX >= gridWidth || cellY < 0 || cellY >= gridHeight) return null;
  return { x: cellX, y: cellY };
}

function pushHistory() {
  history.push({
    pathNodes: JSON.parse(JSON.stringify(pathNodes)),
    towerSpots: JSON.parse(JSON.stringify(towerSpots)),
  });
  if (history.length > 50) history.shift();
}

function undo() {
  const prev = history.pop();
  if (prev) {
    pathNodes = prev.pathNodes;
    towerSpots = prev.towerSpots;
    render();
    updatePathNodeList();
    updateTowerCount();
  }
}

canvas.addEventListener('mousedown', (e) => {
  const cell = getCellFromEvent(e);
  if (!cell) return;

  pushHistory();

  if (e.button === 0) { // 左键
    if (currentTool === 'path') {
      pathNodes.push(cell);
      updatePathNodeList();
    } else if (currentTool === 'tower') {
      const key = `${cell.x},${cell.y}`;
      if (!towerSpots.some(s => `${s.x},${s.y}` === key)) {
        towerSpots.push(cell);
        updateTowerCount();
      }
    } else if (currentTool === 'erase') {
      // 擦除路径节点
      const idx = pathNodes.findIndex(n => n.x === cell.x && n.y === cell.y);
      if (idx >= 0) {
        pathNodes.splice(idx, 1);
        updatePathNodeList();
      }
      // 擦除塔位
      const tIdx = towerSpots.findIndex(s => s.x === cell.x && s.y === cell.y);
      if (tIdx >= 0) {
        towerSpots.splice(tIdx, 1);
        updateTowerCount();
      }
    }
  } else if (e.button === 2) { // 右键
    if (currentTool === 'path') {
      if (pathNodes.length > 0) pathNodes.pop();
      updatePathNodeList();
    } else if (currentTool === 'tower') {
      const key = `${cell.x},${cell.y}`;
      towerSpots = towerSpots.filter(s => `${s.x},${s.y}` !== key);
      updateTowerCount();
    }
  }

  render();
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') {
    e.preventDefault();
    undo();
  }
});

// ── 工具切换 ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
  });
});

// ── 网格设置 ─────────────────────────────────────────────────────────────────
document.getElementById('apply-grid').addEventListener('click', () => {
  pushHistory();
  gridWidth = parseInt(document.getElementById('grid-width').value) || 32;
  gridHeight = parseInt(document.getElementById('grid-height').value) || 18;
  resizeCanvas();
});

// ── 背景图设置 ───────────────────────────────────────────────────────────────
document.getElementById('bg-select').addEventListener('change', (e) => {
  const url = e.target.value;
  if (!url) {
    backgroundImage = null;
    render();
    return;
  }
  
  const img = new Image();
  img.onload = () => {
    backgroundImage = img;
    render();
  };
  img.src = url;
});

document.getElementById('bg-opacity').addEventListener('change', (e) => {
  bgOpacity = e.target.checked ? 0.5 : 1.0;
  render();
});

// ── 撤销/清空 ────────────────────────────────────────────────────────────────
document.getElementById('undo-btn').addEventListener('click', undo);

document.getElementById('clear-btn').addEventListener('click', () => {
  pushHistory();
  pathNodes = [];
  towerSpots = [];
  render();
  updatePathNodeList();
  updateTowerCount();
});

// ── 关卡选择器填充 ───────────────────────────────────────────────────────────
const levelSelect = document.getElementById('level-select');
levelSelect.innerHTML = '<option value="">-- 选择关卡 --</option>';
campaigns.forEach((campaign, ci) => {
  campaign.levels.forEach((level, li) => {
    const opt = document.createElement('option');
    opt.value = `${ci}-${li}`;
    opt.textContent = `${campaign.name} - ${level.name} (${level.id})`;
    levelSelect.appendChild(opt);
  });
});

// ── 加载关卡 ─────────────────────────────────────────────────────────────────
document.getElementById('load-btn').addEventListener('click', () => {
  const value = levelSelect.value;
  if (!value) {
    alert('请先选择关卡');
    return;
  }
  
  const [ci, li] = value.split('-').map(Number);
  const level = campaigns[ci].levels[li];
  
  pushHistory();
  
  // 应用关卡配置
  const config = getGridConfig(level);
  gridWidth = config.gridWidth;
  gridHeight = config.gridHeight;
  tileSize = config.tileSize;
  
  document.getElementById('grid-width').value = gridWidth;
  document.getElementById('grid-height').value = gridHeight;
  
  // 加载路径和塔位
  pathNodes = level.pathNodes ? [...level.pathNodes] : [];
  towerSpots = level.towerSpots ? [...level.towerSpots] : [];
  
  resizeCanvas();
  updatePathNodeList();
  updateTowerCount();
  
  // 自动选择对应章节背景
  const bgSelect = document.getElementById('bg-select');
  bgSelect.value = `assets/bg-chapter-${campaigns[ci].id}.png`;
  bgSelect.dispatchEvent(new Event('change'));
});

// ── 路径节点列表 ─────────────────────────────────────────────────────────────
function updatePathNodeList() {
  const list = document.getElementById('path-node-list');
  list.innerHTML = '';
  pathNodes.forEach((node, i) => {
    const item = document.createElement('div');
    item.className = 'path-node-item';
    item.innerHTML = `
      <span class="node-coords">#${i}: (${node.x}, ${node.y})</span>
      <div class="node-actions">
        <button class="node-action-btn" data-idx="${i}" title="删除">🗑</button>
      </div>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll('.node-action-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      pushHistory();
      const idx = parseInt(btn.dataset.idx);
      pathNodes.splice(idx, 1);
      render();
      updatePathNodeList();
    });
  });
}

function updateTowerCount() {
  document.getElementById('tower-count').textContent = `共 ${towerSpots.length} 个塔位`;
}

// ── 导出 ─────────────────────────────────────────────────────────────────────
function generateExport() {
  return {
    tileSize,
    gridWidth,
    gridHeight,
    pathNodes: pathNodes.map(n => ({ x: n.x, y: n.y })),
    towerSpots: towerSpots.map(s => ({ x: s.x, y: s.y })),
  };
}

document.getElementById('export-btn').addEventListener('click', () => {
  const output = generateExport();
  document.getElementById('export-output').textContent = JSON.stringify(output, null, 2);
});

// ── 保存为文件 ───────────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', () => {
  const data = generateExport();
  const levelName = levelSelect.options[levelSelect.selectedIndex]?.text || 'custom-level';
  const safeName = levelName.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_').slice(0, 50);
  
  // 生成说明文档
  const instructions = `
═══════════════════════════════════════════════════════════
  魔道塔防 - 关卡配置保存说明
═══════════════════════════════════════════════════════════

📁 文件应放置位置：

  repo/src/levels/

📝 使用方式：

  1. 将下载的 .js 文件重命名为对应关卡名
     例如：level1-1.js (第 1 章第 1 关)

  2. 在 repo/src/levels/campaigns.js 中引用该文件：
     
     import { levelConfig as level1_1 } from './level1-1.js';

  3. 在对应章节的 levels 数组中使用：
     
     levels: [
       {
         ...level1_1,
         id: "1-1",
         name: "自定义关卡名",
       },
       // ...
     ]

  或者直接复制 levelConfig 中的内容到 campaigns.js 对应关卡配置中。

═══════════════════════════════════════════════════════════
  项目资源结构：

  repo/
  ├── assets/              # 图片资源
  │   ├── bg-chapter-1.png
  │   ├── enemy-soldier-walk.png
  │   └── ...
  └── src/
      └── levels/          # 关卡配置 ← 放这里
          ├── campaigns.js
          ├── level1.js
          └── ...
═══════════════════════════════════════════════════════════
`.trim();

  const fileContent = `// 魔道塔防 - 关卡配置
// 关卡：${levelName}
// 生成时间：${new Date().toLocaleString('zh-CN')}
//
${instructions.split('\n').map(line => '// ' + line).join('\n')}

export const levelConfig = ${JSON.stringify(data, null, 2)};
`;
  
  const blob = new Blob([fileContent], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${safeName}.js`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  // 显示提示
  alert(`✅ 文件已下载！

📁 请将其放入：repo/src/levels/

📖 文件内包含详细使用说明，查看注释了解如何集成到 campaigns.js`);
});

// ── 初始化 ───────────────────────────────────────────────────────────────────
resizeCanvas();
updatePathNodeList();
updateTowerCount();
</script>

</body>
</html>
